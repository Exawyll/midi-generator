<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIDI.GEN — AI Arrangement Generator</title>

    <!-- Tailwind CSS via CDN — no build step needed -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // Studio dark palette
              studio: {
                bg:        "#09090f",
                surface:   "#111118",
                border:    "#1e1e2e",
                muted:     "#2a2a3e",
              },
              // Neon accent — cyan electric
              neon: {
                cyan:   "#00f5d4",
                blue:   "#0ea5e9",
                purple: "#a855f7",
                orange: "#f97316",
                pink:   "#ec4899",
              },
            },
            fontFamily: {
              mono: ['"JetBrains Mono"', '"Fira Code"', 'ui-monospace', 'monospace'],
              sans: ['"Inter"', 'ui-sans-serif', 'system-ui'],
            },
            animation: {
              "pulse-slow":   "pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite",
              "fade-in":      "fadeIn 0.4s ease-out forwards",
              "slide-up":     "slideUp 0.4s ease-out forwards",
              "shimmer":      "shimmer 1.5s infinite",
            },
            keyframes: {
              fadeIn:  { from: { opacity: 0 }, to: { opacity: 1 } },
              slideUp: { from: { opacity: 0, transform: "translateY(16px)" }, to: { opacity: 1, transform: "translateY(0)" } },
              shimmer: {
                "0%":   { backgroundPosition: "-400px 0" },
                "100%": { backgroundPosition: "400px 0" },
              },
            },
          },
        },
      };
    </script>

    <!-- Google Fonts — Inter + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body { background-color: #09090f; }

      /* Neon glow utilities not coverable via Tailwind config */
      .glow-cyan  { text-shadow: 0 0 12px #00f5d4, 0 0 24px #00f5d499; }
      .glow-box   { box-shadow: 0 0 0 1px #00f5d440, 0 0 16px #00f5d420; }
      .glow-box-hover:hover { box-shadow: 0 0 0 1px #00f5d480, 0 0 24px #00f5d440; }

      /* Shimmer skeleton loader */
      .shimmer-bg {
        background: linear-gradient(90deg, #1e1e2e 25%, #2a2a3e 50%, #1e1e2e 75%);
        background-size: 400px 100%;
        animation: shimmer 1.5s infinite;
      }

      /* Custom range slider */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        border-radius: 2px;
        background: #1e1e2e;
        outline: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #00f5d4;
        cursor: pointer;
        box-shadow: 0 0 8px #00f5d480;
        transition: box-shadow 0.2s;
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        box-shadow: 0 0 16px #00f5d4cc;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #111118; }
      ::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #00f5d440; }
    </style>
  </head>
  <body class="font-sans text-gray-100">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
